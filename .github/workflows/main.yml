name: CI / CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests and checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: teamfinder
          POSTGRES_USER: tf_admin
          POSTGRES_PASSWORD: tf_password_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tf_admin -d teamfinder"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key-placeholder
      DJANGO_DEBUG: "True"
      TASK_VERSION: "1"
      POSTGRES_DB: teamfinder
      POSTGRES_USER: tf_admin
      POSTGRES_PASSWORD: tf_password_ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Verify migration state (check for missing migrations)
        run: python manage.py makemigrations --check --dry-run

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run Django tests
        run: python manage.py test

  build:
    name: Build and push image to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: hokadva/team-finder-ad:latest